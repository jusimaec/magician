<!DOCTYPE html>
<html lang="ko"> 
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>時空術 Magician 다운로드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Cinzel:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #2a2a3a;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #e8e0d0;
      --muted: #7a7070;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(201,168,76,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(201,168,76,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 15%, rgba(201,168,76,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 45%, rgba(255,255,255,0.08) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.8s ease both;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .logo-img {
      width: 100%;
      max-width: 100%;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(201,168,76,0.25), 0 0 80px rgba(201,168,76,0.1);
      animation: logoPulse 3s ease-in-out infinite;
      display: block;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(201,168,76,0.25), 0 0 80px rgba(201,168,76,0.1); }
      50% { box-shadow: 0 0 60px rgba(201,168,76,0.45), 0 0 100px rgba(201,168,76,0.2); }
    }

    .symbol {
      font-size: 42px;
      margin-bottom: 16px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
      50% { filter: drop-shadow(0 0 24px rgba(201,168,76,0.9)); }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--gold-light);
      text-shadow: 0 0 30px rgba(201,168,76,0.4);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 40px;
      width: 300px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .divider span {
      color: var(--gold);
      font-size: 16px;
    }

    .section-divider {
      width: 380px;
      gap: 18px;
      margin: 26px auto 58px;
      opacity: 0.92;
    }

    .section-divider::before,
    .section-divider::after {
      height: 2px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.28), var(--gold));
    }

    .section-divider::after {
      background: linear-gradient(to left, transparent, rgba(201,168,76,0.28), var(--gold));
    }

    .section-divider span {
      font-size: 14px;
      letter-spacing: 0.1em;
      text-shadow: 0 0 14px rgba(201,168,76,0.42);
      transform: translateY(-1px);
    }

    .access-divider {
      width: 460px;
      gap: 16px;
      margin: 38px auto 74px;
      opacity: 0.98;
    }

    .access-divider::before,
    .access-divider::after {
      height: 0;
      border-top: 2px dashed rgba(79,181,167,0.72);
      background: none;
    }

    .access-divider span {
      color: #9ee9df;
      font-size: 11px;
      letter-spacing: 0.22em;
      padding: 5px 14px;
      border: 1px solid rgba(79,181,167,0.9);
      border-radius: 999px;
      background: rgba(79,181,167,0.12);
      text-shadow: 0 0 12px rgba(79,181,167,0.45);
      transform: translateY(0);
    }

    /* File list */
    #file-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      animation: fadeUp 0.5s ease both;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .file-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .file-card:hover {
      border-color: rgba(201,168,76,0.4);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .file-card:hover::before {
      opacity: 1;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
      margin-bottom: 4px;
    }

    .file-size {
      font-size: 12px;
      color: var(--muted);
    }

    .download-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      padding: 8px 18px;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
      white-space: nowrap;
    }

    .download-btn:hover {
      background: var(--gold);
      color: var(--bg);
      box-shadow: 0 0 16px rgba(201,168,76,0.4);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error {
      text-align: center;
      padding: 40px 20px;
      color: #c06060;
      font-size: 14px;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Remote support button */
    .remote-divider-wrap {
      margin-top: 52px;
    }

    .remote-divider {
      width: 100%;
      margin: 0 auto 36px;
      opacity: 0.7;
    }

    .remote-divider::before,
    .remote-divider::after {
      height: 1px;
      background: linear-gradient(to right, transparent, #9b72cf);
    }

    .remote-divider::after {
      background: linear-gradient(to left, transparent, #9b72cf);
    }

    .remote-divider span {
      color: #c4a0f0;
      font-size: 16px;
    }

    .remote-support-wrap {
      text-align: center;
      animation: fadeUp 1s ease 0.3s both;
    }

    .remote-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      border: 1px solid #9b72cf;
      color: #c4a0f0;
      font-family: 'Noto Serif KR', serif;
      font-size: 20px;
      letter-spacing: 0.2em;
      padding: 16px 52px;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .remote-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(155,114,207,0.08);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .remote-btn:hover {
      background: #9b72cf;
      color: #0a0a0f;
      box-shadow: 0 0 24px rgba(155,114,207,0.5), 0 0 48px rgba(155,114,207,0.2);
    }

    .remote-btn:hover::before {
      opacity: 1;
    }

    .remote-btn-icon {
      font-size: 22px;
      line-height: 1;
    }

    /* Footer */
    footer {
      margin-top: 40px;
      text-align: center;
      color: #aaa;
      font-size: 14px;
      letter-spacing: 0.15em;
      animation: fadeUp 1s ease 0.5s both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section {
      margin-bottom: 32px;
    }

    .section-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      padding: 16px 20px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      background: rgba(201,168,76,0.05);
      box-shadow: inset 0 0 20px rgba(201,168,76,0.05), 0 0 20px rgba(201,168,76,0.08);
      letter-spacing: 0.05em;
    }

    .section-title-access {
      border-color: #4fb5a7;
      background: rgba(79,181,167,0.08);
      box-shadow: inset 0 0 20px rgba(79,181,167,0.08), 0 0 20px rgba(79,181,167,0.12);
      color: #9ee9df;
    }

    .section-title-access .access-note {
      font-size: 0.6em;
      font-weight: 600;
      opacity: 0.95;
    }

    .section-access .file-name,
    .section-access .version-label {
      color: #9ee9df;
    }

    .section-access .file-size {
      color: var(--muted);
    }

    .section-access .download-btn {
      border-color: #4fb5a7;
      color: #9ee9df;
    }

    .section-access .download-btn:hover {
      background: #4fb5a7;
      color: #0a0a0f;
      box-shadow: 0 0 16px rgba(79,181,167,0.4);
    }

    .section-access .file-card:hover {
      border-color: rgba(79,181,167,0.6);
      box-shadow: 0 4px 24px rgba(20,130,120,0.28);
    }

    .section-access .file-card::before {
      background: linear-gradient(to bottom, #4fb5a7, transparent);
    }

    .version-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.08em;
      margin: 20px 0 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-wrap">
        <img src="" style="display:none" alt="時空術 Magician" class="logo-img"/>
        <div id="logo-fallback" style="display:none; text-align:center; padding: 20px 0;">
          <div style="font-family: 'Noto Serif KR', serif; font-size: clamp(36px, 8vw, 64px); font-weight: 700; color: #e8c97a; text-shadow: 0 0 30px rgba(201,168,76,0.5); letter-spacing: 0.05em; line-height: 1.2;">時空術 Magician</div>
          <div style="font-family: 'Noto Serif KR', serif; font-size: clamp(16px, 3vw, 24px); color: #e8e0d0; margin-top: 12px; letter-spacing: 0.08em;">도서출판 역리원 (02-396-0841)</div>
        </div>
      </div>
    </header>

    <div class="divider"><span>✦</span></div>

    <div id="file-list">
      <div class="loading">
        <div class="loading-spinner"></div>
        파일 목록 불러오는 중...
      </div>
    </div>

    <!-- 원격지원 구분선 + 버튼 -->
    <div class="remote-divider-wrap">
      <div class="divider remote-divider"><span>◈</span></div>
    </div>
    <div class="remote-support-wrap">
      <a href="https://jusimaec.github.io/remote" target="_blank" rel="noopener" class="remote-btn">
        <span class="remote-btn-icon">🖥️</span>
        원격 지원
      </a>
    </div>

    <footer>
      <p>© 도서출판 역리원 · 時空術 Magician</p>
      <div style="margin-top:10px;">
        <button onclick="loadFromGoogle()" style="background:transparent;border:1px solid #888;color:#aaa;font-size:10px;padding:3px 9px;border-radius:2px;cursor:pointer;letter-spacing:0.1em;font-family:'Cinzel',serif;">GDrive</button>
      </div>
    </footer>
  </div>

  <script>
    // ===== Dropbox 설정 =====
    const CLIENT_ID = 'kmdebnypv4oe50u';
    const CLIENT_SECRET = 'tdlnvo7uk7npcjm';
    const REFRESH_TOKEN = 'uCfWUYOeAakAAAAAAAAAAeIKir1sQc_sARS_0alI_jhSC5fc8XFGmJqNI6RP0ufv';
    const FOLDER_PATH = '';
    let accessToken = null;

    // ===== Google Drive 설정 (백업) =====
    const GOOGLE_API_KEY = 'AIzaSyDyf2cCorgZ_7CCmKGq90GMespvEqQKMqc';
    const GOOGLE_FOLDER_ID = '1uU6GyUKVx7r13AeeZ6UmoqGhtx4Up6Lx';

    // ===== 소스 표시 =====
    function setSourceIndicator(source) {
      const el = document.getElementById('source-indicator');
      if (el) el.textContent = source === 'dropbox' ? '● Dropbox' : '● Google Drive';
    }

    // ===== 버전 추출 =====
    function getVer(name) {
      const m = name.match(/_(\d+\.\d+)/);
      return m ? parseFloat(m[1]) : 0;
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      bytes = parseInt(bytes);
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function hasAccessDatabaseEngine(name) {
      // File name contains AccessDatabaseEngine anywhere, regardless of case.
      return /accessdatabaseengine/i.test(name);
    }

    // ===== Dropbox: 토큰 갱신 =====
    async function getAccessToken() {
      const res = await fetch('https://api.dropbox.com/oauth2/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `grant_type=refresh_token&refresh_token=${REFRESH_TOKEN}&client_id=${CLIENT_ID}&client_secret=${CLIENT_SECRET}`
      });
      const data = await res.json();
      if (!data.access_token) throw new Error('Dropbox 토큰 갱신 실패');
      accessToken = data.access_token;
    }

    // ===== 로고: Dropbox =====
    async function loadLogoDropbox(path) {
      try {
        const res = await fetch('https://api.dropboxapi.com/2/files/get_temporary_link', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ path })
        });
        if (!res.ok) return;
        const data = await res.json();
        const logoImg = document.querySelector('.logo-img');
        if (logoImg) {
          logoImg.src = data.link;
          logoImg.style.display = 'block';
          const fallback = document.getElementById('logo-fallback');
          if (fallback) fallback.style.display = 'none';
        }
      } catch (err) { console.log('Dropbox 로고 실패:', err); }
    }

    // ===== 로고: Google Drive =====
    function loadLogoGoogle(fileId) {
      const logoImg = document.querySelector('.logo-img');
      if (logoImg) {
        logoImg.src = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${GOOGLE_API_KEY}`;
        logoImg.style.display = 'block';
        const fallback = document.getElementById('logo-fallback');
        if (fallback) fallback.style.display = 'none';
      }
    }

    // ===== 공통: 파일 렌더링 =====
    function renderFiles(container, files, downloadFn) {
      const accessDb = files.filter(f => hasAccessDatabaseEngine(f.name)).sort((a,b) => getVer(a.name) - getVer(b.name));
      const yeokrywon = files.filter(f => f.name.includes('도서출판역리원') && !hasAccessDatabaseEngine(f.name)).sort((a,b) => getVer(a.name) - getVer(b.name));
      const koryeo = files.filter(f => f.name.includes('고려기문학회') && !hasAccessDatabaseEngine(f.name)).sort((a,b) => getVer(a.name) - getVer(b.name));

      function renderSection(title, fileList, startIdx, titleClass = '', splitByVersion = true) {
        if (fileList.length === 0) return;
        const section = document.createElement('div');
        section.className = 'section';
        if (titleClass === 'section-title-access') {
          section.classList.add('section-access');
        }
        const titleClasses = ['section-title', titleClass].filter(Boolean).join(' ');
        section.innerHTML = `<div class="${titleClasses}">${title}</div>`;
        const v3 = splitByVersion ? fileList.filter(f => f.name.includes('_3.')) : [];
        const v4 = splitByVersion ? fileList.filter(f => f.name.includes('_4.')) : [];
        const others = splitByVersion ? fileList.filter(f => !f.name.includes('_3.') && !f.name.includes('_4.')) : fileList;

        function renderGroup(label, group, offset) {
          if (group.length === 0) return;
          const groupDiv = document.createElement('div');
          if (label) {
            groupDiv.innerHTML = `<div class="version-label">${label}</div>`;
          }
          group.forEach((file, i) => {
            const card = document.createElement('div');
            card.className = 'file-card';
            card.style.animationDelay = `${(offset + i) * 0.08}s`;
            card.innerHTML = `
              <div class="file-info">
                <div class="file-name">${file.name}</div>
                <div class="file-size">${formatSize(file.size)}</div>
              </div>
              <button class="download-btn" data-key="${file.key}" data-name="${file.name}">DOWNLOAD</button>
            `;
            card.querySelector('.download-btn').addEventListener('click', () => downloadFn(file));
            groupDiv.appendChild(card);
          });
          section.appendChild(groupDiv);
        }

        if (splitByVersion) {
          renderGroup('일반 버전 (ver.3)', v3, startIdx);
          renderGroup('프로 버전 (ver.4)', v4, startIdx + v3.length);
        } else {
          renderGroup('', others, startIdx);
        }
        container.appendChild(section);
      }

      container.innerHTML = '';
      let fileOffset = 0;
      let sectionCount = 0;

      if (yeokrywon.length > 0) {
        renderSection('도서출판 역리원', yeokrywon, fileOffset);
        fileOffset += yeokrywon.length;
        sectionCount += 1;
      }

      if (koryeo.length > 0) {
        if (sectionCount > 0) {
          const divider = document.createElement('div');
            divider.className = 'divider section-divider';
            divider.innerHTML = '<span>◆</span>';
          container.appendChild(divider);
        }
        renderSection('고려기문학회', koryeo, fileOffset);
        fileOffset += koryeo.length;
        sectionCount += 1;
      }

      if (accessDb.length > 0) {
        if (sectionCount > 0) {
          const divider = document.createElement('div');
            divider.className = 'divider access-divider';
            divider.innerHTML = '<span>ENGINE</span>';
          container.appendChild(divider);
        }
        renderSection('고객관리 구동 Engine<span class="access-note">(고객관리 오류시 설치)</span>', accessDb, fileOffset, 'section-title-access', false);
      }
    }

    // ===== Dropbox: 공유 링크 → dl=1 변환 =====
    function toDl1(url) {
      if (url.includes('dl=0')) return url.replace('dl=0', 'dl=1');
      if (url.includes('?')) return url + '&dl=1';
      return url + '?dl=1';
    }

    // 파일별 dl=1 URL 캐시 { path_lower: url }
    const sharedLinkCache = {};

    // ===== Dropbox: 다운로드 (dl=1 방식) =====
    async function downloadDropbox(file) {
      const btn = document.querySelector(`[data-key="${file.key}"]`);
      if (btn) { btn.textContent = '...'; btn.disabled = true; }
      try {
        await getAccessToken();

        // 캐시 확인
        if (!sharedLinkCache[file.path_lower]) {
          // 기존 공유링크 조회
          const listRes = await fetch('https://api.dropboxapi.com/2/sharing/list_shared_links', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ path: file.path_lower, direct_only: true })
          });
          if (listRes.ok) {
            const listData = await listRes.json();
            if (listData.links && listData.links.length > 0) {
              sharedLinkCache[file.path_lower] = toDl1(listData.links[0].url);
            }
          }

          // 없으면 새로 생성
          if (!sharedLinkCache[file.path_lower]) {
            const createRes = await fetch('https://api.dropboxapi.com/2/sharing/create_shared_link_with_settings', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
              body: JSON.stringify({ path: file.path_lower, settings: { requested_visibility: 'public' } })
            });
            if (createRes.ok) {
              const createData = await createRes.json();
              sharedLinkCache[file.path_lower] = toDl1(createData.url);
            } else {
              const errData = await createRes.json().catch(() => ({}));
              if (errData?.error_summary?.startsWith('shared_link_already_exists')) {
                const url = errData.error?.shared_link_already_exists?.metadata?.url;
                if (url) sharedLinkCache[file.path_lower] = toDl1(url);
              }
            }
          }
        }

        if (!sharedLinkCache[file.path_lower]) throw new Error('공유 링크 생성에 실패했습니다.');

        const a = document.createElement('a');
        a.href = sharedLinkCache[file.path_lower]; a.download = file.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      } catch (err) { alert('다운로드 오류: ' + err.message); }
      finally { if (btn) { btn.textContent = 'DOWNLOAD'; btn.disabled = false; } }
    }

    // ===== Google Drive: 다운로드 =====
    async function downloadGoogle(file) {
      const btn = document.querySelector(`[data-key="${file.key}"]`);
      if (btn) { btn.textContent = '...'; btn.disabled = true; }
      try {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media&key=${GOOGLE_API_KEY}`);
        if (!res.ok) throw new Error('다운로드 실패');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) { alert('다운로드 오류: ' + err.message); }
      finally { if (btn) { btn.textContent = 'DOWNLOAD'; btn.disabled = false; } }
    }

    // ===== Google Drive 불러오기 (버튼용) =====
    async function loadFromGoogle() {
      const container = document.getElementById('file-list');
      container.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Google Drive 불러오는 중...</div>';
      try {
        const url = `https://www.googleapis.com/drive/v3/files?q='${GOOGLE_FOLDER_ID}'+in+parents+and+trashed=false&fields=files(id,name,size,mimeType)&orderBy=name&key=${GOOGLE_API_KEY}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Google Drive API 오류: ${response.status}`);
        const data = await response.json();

        const logoFile = data.files.find(f => /logo/i.test(f.name) && /\.(png|jpg|jpeg)$/i.test(f.name));
        if (logoFile) { loadLogoGoogle(logoFile.id); }
        else { const fb = document.getElementById('logo-fallback'); if (fb) fb.style.display = 'block'; }

        const files = data.files
          .filter(f => !(/logo/i.test(f.name) && /\.(png|jpg|jpeg)$/i.test(f.name)))
          .map(f => ({ name: f.name, size: f.size, id: f.id, key: f.id }));

        if (files.length === 0) { container.innerHTML = '<div class="empty">파일이 없습니다.</div>'; return; }
        renderFiles(container, files, downloadGoogle);
        setSourceIndicator('google');
      } catch (err) {
        container.innerHTML = `<div class="error">⚠️ Google Drive 연결 실패.<br><small>${err.message}</small></div>`;
      }
    }

    // ===== 메인: Dropbox 먼저, 실패시 Google Drive =====
    async function loadFiles() {
      const container = document.getElementById('file-list');

      // 1. Dropbox 시도
      try {
        await getAccessToken();
        const response = await fetch('https://api.dropboxapi.com/2/files/list_folder', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: FOLDER_PATH })
        });
        if (!response.ok) throw new Error(`Dropbox API 오류: ${response.status}`);

        const data = await response.json();
        const logoFile = data.entries.find(e => e['.tag'] === 'file' && /logo/i.test(e.name) && /\.(png|jpg|jpeg)$/i.test(e.name));
        if (logoFile) { loadLogoDropbox(logoFile.path_lower); }
        else { const fb = document.getElementById('logo-fallback'); if (fb) fb.style.display = 'block'; }

        const files = data.entries
          .filter(e => e['.tag'] === 'file' && !(/logo/i.test(e.name) && /\.(png|jpg|jpeg)$/i.test(e.name)))
          .map(e => ({ name: e.name, size: e.size, path_lower: e.path_lower, key: e.path_lower }));

        if (files.length === 0) { container.innerHTML = '<div class="empty">파일이 없습니다.</div>'; return; }
        renderFiles(container, files, downloadDropbox);
        setSourceIndicator('dropbox');
        return;

      } catch (err) {
        console.warn('⚠️ Dropbox 실패, Google Drive로 전환:', err.message);
      }

      // 2. Google Drive 백업
      await loadFromGoogle();
    }

    loadFiles();
  </script>
  <div id="source-indicator" style="position:fixed; bottom:10px; right:12px; font-size:11px; color:#c9a84c; letter-spacing:0.08em; z-index:999;"></div>
</body>
