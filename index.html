<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>時空術 Magician 다운로드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Cinzel:wght@600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #2a2a3a;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #e8e0d0;
      --muted: #7a7070;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* Starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(201,168,76,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 70%, rgba(255,255,255,0.1) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(201,168,76,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.12) 0%, transparent 100%),
        radial-gradient(2px 2px at 35% 15%, rgba(201,168,76,0.15) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 45%, rgba(255,255,255,0.08) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.8s ease both;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .logo-img {
      width: 220px;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(201,168,76,0.25), 0 0 80px rgba(201,168,76,0.1);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 40px rgba(201,168,76,0.25), 0 0 80px rgba(201,168,76,0.1); }
      50% { box-shadow: 0 0 60px rgba(201,168,76,0.45), 0 0 100px rgba(201,168,76,0.2); }
    }

    .symbol {
      font-size: 42px;
      margin-bottom: 16px;
      display: block;
      filter: drop-shadow(0 0 12px rgba(201,168,76,0.5));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(201,168,76,0.5)); }
      50% { filter: drop-shadow(0 0 24px rgba(201,168,76,0.9)); }
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--gold-light);
      text-shadow: 0 0 30px rgba(201,168,76,0.4);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 40px;
      width: 300px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .divider span {
      color: var(--gold);
      font-size: 16px;
    }

    /* File list */
    #file-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      animation: fadeUp 0.5s ease both;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .file-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .file-card:hover {
      border-color: rgba(201,168,76,0.4);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .file-card:hover::before {
      opacity: 1;
    }

    .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      word-break: break-all;
      margin-bottom: 4px;
    }

    .file-size {
      font-size: 12px;
      color: var(--muted);
    }

    .download-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      padding: 8px 18px;
      border-radius: 2px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
      white-space: nowrap;
    }

    .download-btn:hover {
      background: var(--gold);
      color: var(--bg);
      box-shadow: 0 0 16px rgba(201,168,76,0.4);
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error */
    .error {
      text-align: center;
      padding: 40px 20px;
      color: #c06060;
      font-size: 14px;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* Footer */
    footer {
      margin-top: 56px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.15em;
      animation: fadeUp 1s ease 0.5s both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section {
      margin-bottom: 32px;
    }

    .section-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
      padding: 16px 20px;
      border: 2px solid var(--gold);
      border-radius: 4px;
      background: rgba(201,168,76,0.05);
      box-shadow: inset 0 0 20px rgba(201,168,76,0.05), 0 0 20px rgba(201,168,76,0.08);
      letter-spacing: 0.05em;
    }

    .version-label {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.08em;
      margin: 20px 0 10px;
    }
  </style>
</head>

    const FOLDER_PATH = '';

    async function loadFiles() {
      const container = document.getElementById('file-list');

      try {
        const response = await fetch('https://api.dropboxapi.com/2/files/list_folder', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${ACCESS_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ path: FOLDER_PATH })
        });

        if (!response.ok) {
          throw new Error(`API 오류: ${response.status}`);
        }

        const data = await response.json();
        const files = data.entries.filter(e => e['.tag'] === 'file');

        if (files.length === 0) {
          container.innerHTML = '<div class="empty">파일이 없습니다.</div>';
          return;
        }

        container.innerHTML = '';

        // 분류
        const yeokrywon = files.filter(f => f.name.includes('도서출판역리원') || f.name.includes('도서출판역리원'));
        const koryeo = files.filter(f => f.name.includes('고려기문학회'));

        function getVersion(name) {
          if (name.includes('_4.')) return '4대';
          if (name.includes('_3.')) return '3대';
          return '기타';
        }

        function renderSection(title, fileList, startIdx) {
          if (fileList.length === 0) return;

          const section = document.createElement('div');
          section.className = 'section';
          section.innerHTML = `<div class="section-title">${title}</div>`;

          // 버전별 그룹
          const v3 = fileList.filter(f => getVersion(f.name) === '3대');
          const v4 = fileList.filter(f => getVersion(f.name) === '4대');

          function renderGroup(label, group, offset) {
            if (group.length === 0) return;
            const groupDiv = document.createElement('div');
            groupDiv.innerHTML = `<div class="version-label">${label}</div>`;
            group.forEach((file, i) => {
              const sizeText = formatSize(file.size);
              const card = document.createElement('div');
              card.className = 'file-card';
              card.style.animationDelay = `${(offset + i) * 0.08}s`;
              card.innerHTML = `
                <div class="file-info">
                  <div class="file-name">${file.name}</div>
                  <div class="file-size">${sizeText}</div>
                </div>
                <button class="download-btn" data-path="${file.path_lower}" data-name="${file.name}">DOWNLOAD</button>
              `;
              card.querySelector('.download-btn').addEventListener('click', () => downloadFile(file.path_lower, file.name));
              groupDiv.appendChild(card);
            });
            section.appendChild(groupDiv);
          }

          renderGroup('일반 버전 (ver.3)', v3, startIdx);
          renderGroup('프로 버전 (ver.4)', v4, startIdx + v3.length);
          container.appendChild(section);
        }

        renderSection('도서출판 역리원', yeokrywon, 0);

        if (koryeo.length > 0) {
          const divider = document.createElement('div');
          divider.className = 'divider';
          divider.innerHTML = '<span>✦</span>';
          container.appendChild(divider);
          renderSection('고려기문학회', koryeo, yeokrywon.length);
        }

      } catch (err) {
        container.innerHTML = `<div class="error">⚠️ 파일을 불러올 수 없습니다.<br><small>${err.message}</small></div>`;
        console.error(err);
      }
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function downloadFile(path, name) {
      try {
        const btn = document.querySelector(`[data-path="${path}"]`);
        if (btn) { btn.textContent = '...'; btn.disabled = true; }

        const res = await fetch('https://api.dropboxapi.com/2/files/get_temporary_link', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${ACCESS_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ path })
        });

        if (!res.ok) throw new Error('링크 생성 실패');
        const data = await res.json();

        const a = document.createElement('a');
        a.href = data.link;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        if (btn) { btn.textContent = 'DOWNLOAD'; btn.disabled = false; }
      } catch (err) {
        alert('다운로드 오류: ' + err.message);
      }
    }

    loadFiles();
  </script>
</body>
</html>
